<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home page</title>
  <!-- Bootstrap & CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="styles/styles.css" rel="stylesheet" />
</head>



<body>
  <div class="container-fluid">
    <div class="header">
      <div class="header-right">
        <a class="active header-btns" href="index.html">Home</a>
        <a class="header-btns" href="pages/game.html">Game</a>
        <a class="header-btns" href="pages/about.html">About</a>
      </div>
    </div>
  </div>

  <div class="container my-4">
    <h1 class="text-center mb-4">UNA Building Matching Game</h1>
    <p class="text-center mb-4">Search and explore UNA campus buildings. Click on a building to learn more!</p>
    
    <div class="row mb-4">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Search buildings...">
      </div>
      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="asc">Sort A-Z</option>
          <option value="desc">Sort Z-A</option>
        </select>
      </div>
      <div class="col-md-3">
        <button id="sessionBtn" class="btn btn-info w-100">View Session Data</button>
      </div>
    </div>
    
    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3" id="buildingsContainer"></div>
    
    <div class="text-center mt-5">
      <a href="pages/game.html" class="btn my-button btn-lg">Start the Game</a>
    </div>
  </div>

  <footer class="mt-auto py-4 bg-light">
    <div class="container">
      <div class="d-flex justify-content-center align-items-center gap-4 small text-muted flex-wrap">
        <a href="https://github.com/carinanestrada/una-building-matching-game" class="text-decoration-none text-muted py-1" target="_blank">
          <i class="bi bi-github"></i> Source Code
        </a>
        <span>&copy; 2026 UNA Building Game</span>
      </div>
    </div>
  </footer>

  <script src="scripts/data.js"></script>
  <script src="scripts/game-lib.js"></script>
  <script src="scripts/search-logic.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const buildingsContainer = document.getElementById('buildingsContainer');
      const searchInput = document.getElementById('searchInput');
      const sortSelect = document.getElementById('sortSelect');
      const sessionBtn = document.getElementById('sessionBtn');
      
      let buildings = locations.map(l => ({
        name: l.name,
        image: l.img.replace('../', '')
      }));
      
      function renderBuildings(list) {
        buildingsContainer.innerHTML = '';
        list.forEach(building => {
          const col = document.createElement('div');
          col.className = 'col mb-4';
          col.innerHTML = `
            <div class="card h-100">
              <img src="${building.image}" class="card-img-top imges" alt="${building.name}">
              <div class="card-body d-flex flex-column">
                <h5 class="card-title">${building.name}</h5>
              </div>
            </div>
          `;
          buildingsContainer.appendChild(col);
        });
      }
      
      function filterAndSort() {
        let filtered = buildings.filter(b => b.name.toLowerCase().includes(searchInput.value.toLowerCase()));
        if (sortSelect.value === 'desc') {
          filtered.sort((a, b) => b.name.localeCompare(a.name));
        } else {
          filtered.sort((a, b) => a.name.localeCompare(b.name));
        }
        renderBuildings(filtered);
      }
      
      searchInput.addEventListener('input', filterAndSort);
      sortSelect.addEventListener('change', filterAndSort);
      
      sessionBtn.addEventListener('click', function() {
        let data = 'Session Data:\n';
        for (let key in sessionStorage) {
          data += `${key}: ${sessionStorage[key]}\n`;
        }
        alert(data || 'No session data');
      });
      
      renderBuildings(buildings);
    });
  </script>

        <a href="https://github.com/carinanestrada" class="text-decoration-none text-muted py-1" target="_blank">
          <i class="bi bi-github"></i>
          <i class="bi bi-person-circle"></i>
          GitHub Profile
        </a>
      </div>
      <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1080;"></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   


</body>

</html>
