<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles/styles.css" rel="stylesheet" />
</head>


<body>
  <div class="container-fluid">
    <div class="header">
      <div class="header-right">
        <a class="active header-btns" href="index.html">Home</a>
        <a class="header-btns" href="pages/game.html">Game</a>
        <a class="header-btns" href="pages/about.html">About</a>
      </div>
    </div>
  </div>

  <div class="container my-4">
    <h1 class="text-center mb-4">UNA Building Matching Game</h1>
    <p class="text-center mb-4">Search and explore UNA campus buildings</p>

    <div class="row mb-4">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Search buildings...">
      </div>
      <div class="col-md-3">
        <select id="sortSelect" class="form-select">
          <option value="asc">Sort A-Z</option>
          <option value="desc">Sort Z-A</option>
        </select>
      </div>
      <div class="col-md-3">
        <button id="sessionBtn" class="btn btn-info w-100">View Session Data</button>
      </div>
    </div>

    <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3" id="buildingsContainer"></div>

    <div class="text-center mt-5">
      <a href="pages/game.html" class="btn my-button btn-lg">Start the Game</a>
    </div>
  </div>

  <footer class="mt-auto py-4 bg-light">
    <div class="container">
      <div class="d-flex justify-content-center align-items-center gap-4 small text-muted flex-wrap">
        <a href="https://github.com/carinanestrada/final-cis-376" class="text-decoration-none text-muted py-1" target="_blank"> <i class="bi bi-github"></i> Source Code </a>
        <span>&copy; 2026 UNA Building Game</span>
      </div>
    </div>
  </footer>

  <script type="module" src="scripts/index-page.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
